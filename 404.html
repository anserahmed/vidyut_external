<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Page Not Found | Vidyut</title>
  <meta name="description" content="The page you're looking for doesn't exist.">
  <link href="css/revamp.css" rel="stylesheet" type="text/css">
  <link href="images/favicon.png" rel="shortcut icon" type="image/x-icon">
  <script src="js/config.js"></script>
  <script>
    (function(){
      var id = (window.__CONFIG || {}).GA_MEASUREMENT_ID || 'GA_TAG_TO_BE_ADDED';
      var s = document.createElement('script');
      s.async = true;
      s.src = 'https://www.googletagmanager.com/gtag/js?id=' + id;
      document.head.appendChild(s);
      window.dataLayer = window.dataLayer || [];
      function gtag(){ dataLayer.push(arguments); }
      gtag('js', new Date());
      gtag('config', id);
    })();
  </script>
</head>
<body>
  <div class="page-shell">
    <div id="site-header"></div>

    <main class="not-found-wrap">
      <h1>Page not found</h1>
      <p>Sorry, the page you're looking for doesn't exist or has been moved.</p>
      <a href="index.html" class="btn-home">Go to homepage</a>
    </main>

    <div id="site-footer"></div>
  </div>
  <script src="js/revamp.js"></script>
</body>
</html>
