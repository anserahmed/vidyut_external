<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Commercial Vehicles | Vidyut</title>

  <link href="/css/revamp.css" rel="stylesheet" />
  <link href="/images/favicon.png" rel="shortcut icon" />

  <style>
    /* ── Global ───────────────────────── */
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      overflow-x: hidden;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 0 clamp(1rem, 4vw, 2rem);
    }

    /* ── Section ───────────────────────── */
    .section {
      padding: clamp(4rem, 8vw, 6rem) 0;
    }

    /* ── Breadcrumb ───────────────────────── */
    .page-breadcrumbs {
      font-size: 0.9rem;
      color: #666;
      margin-bottom: 1rem;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .page-breadcrumbs a {
      text-decoration: none;
      color: #444;
    }

    .page-breadcrumb-sep {
      opacity: 0.5;
    }

    /* ── Heading ───────────────────────── */
    h1 {
      text-align: center;
      margin: 1rem 0;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      line-height: 1.2;
    }

    .lead {
      text-align: center;
      color: #555;
      max-width: 600px;
      margin: auto;
      font-size: clamp(0.95rem, 1.8vw, 1.1rem);
    }

    /* ── Grid ───────────────────────── */
    .personal-selector-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: clamp(1.2rem, 3vw, 2rem);
      margin-top: 2.5rem;
    }

    @media (max-width: 768px) {
      .personal-selector-grid {
        grid-template-columns: 1fr;
      }
    }

    /* ── Card ───────────────────────── */
    .selector-card {
      background: #fff;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 6px 25px rgba(0, 0, 0, 0.08);
      transition: 0.3s ease;
      display: flex;
      flex-direction: column;
    }

    .selector-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 14px 35px rgba(0, 0, 0, 0.15);
    }

    @media (hover: none) {
      .selector-card:hover {
        transform: none;
      }
    }

    .selector-card-image {
      width: 100%;
      height: 260px;
      object-fit: cover;
    }

    @media (max-width: 480px) {
      .selector-card-image {
        height: 200px;
      }
    }

    /* ── Button ───────────────────────── */
    .button-row {
      padding: 1.25rem;
      display: flex;
      justify-content: center;
    }

    .button {
      background: #1a1a2e;
      color: #fff;
      padding: 12px 20px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      transition: 0.2s;
      width: fit-content;
    }

    .button:hover {
      background: #2d2d50;
    }

    @media (max-width: 480px) {
      .button {
        width: 100%;
        text-align: center;
      }
    }

    /* ── Footer ───────────────────────── */
    .footer-inner {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      padding: 1.5rem 0;
    }

    .footer-links a {
      margin-left: 1rem;
      text-decoration: none;
      color: #333;
    }
  </style>
</head>

<body class="personal-selector-page commercial-selector-page">
  <div class="page-shell">

    <!-- Header -->
    <header class="site-header"></header>

    <main>
      <section class="section" style="padding-top: 6rem;">
        <div class="container">

          <!-- Breadcrumb -->
          <nav class="page-breadcrumbs">
            <a href="/electric-vehicles/">Vehicles</a>
            <span class="page-breadcrumb-sep">/</span>
            <span>Commercial EVs</span>
          </nav>

          <!-- Heading -->
          <h1>Choose Your Commercial EV</h1>
          <p class="lead">
            Browse commercial EVs available with Vidyut Ownership Plan.
          </p>

          <!-- Cards -->
          <div class="personal-selector-grid">

            <!-- 3W -->
            <a href="/commercial-3w/" class="selector-card">
              <img 
                src="/images/commercial-3W-thumb.webp"
                class="selector-card-image"
                alt="Commercial 3W EV"
              />
              <div class="button-row">
                <span class="button">Explore 3Ws</span>
              </div>
            </a>

            <!-- 4W -->
            <a href="/commercial-4w/" class="selector-card">
              <img
                src="/images/content/products/ace.webp"
                class="selector-card-image"
                alt="Commercial 4W EV"
              />
              <div class="button-row">
                <span class="button">Explore 4Ws</span>
              </div>
            </a>

          </div>
        </div>
      </section>
    </main>

    <!-- Footer -->
    <footer class="site-footer">
      <div class="container footer-inner">
        <div>© VidyutTech 2026</div>
        <div class="footer-links">
          <a href="/commercial-3w/">Commercial 3W</a>
          <a href="/commercial-4w/">Commercial 4W</a>
          <a href="/contact/">Contact</a>
        </div>
      </div>
    </footer>

  </div>

  <script src="/js/config.js"></script>
  <script src="/js/revamp.js"></script>
</body>
</html>
